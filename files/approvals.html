<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SchoolBook — Approvals</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div id="nav-ph"></div>
  <div class="page-wrap">
    <div class="page-header">
      <h1>✅ Approval Queue</h1>
      <p>Review and act on booking requests assigned to your role.</p>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:1.5rem;">
      <button class="btn btn-primary btn-sm" id="tab-pending" onclick="switchTab('pending')">Pending My Action</button>
      <button class="btn btn-ghost btn-sm"   id="tab-history" onclick="switchTab('history')">My History</button>
    </div>

    <div id="tab-content">
      <div style="text-align:center;padding:3rem;color:var(--text3);">Loading…</div>
    </div>
  </div>

  <!-- REVIEW MODAL -->
  <div class="modal-overlay" id="review-modal">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div id="review-content"></div>
    </div>
  </div>

  <script type="module">
    import {
      requireAuth, renderNav, initNotifs,
      getPendingForApprover, getHistoryForApprover,
      actOnStep, addNotification, showToast,
      formatDate, formatDateTime, formatTime,
      statusBadge, stepClass, stepIcon
    } from './app.js';

    const user = await requireAuth(['faculty','custodian','finance','president']);
    if (!user) throw new Error();
    document.getElementById('nav-ph').innerHTML = renderNav(user);
    await initNotifs(user);

    let pendingList = [], historyList = [], currentTab = 'pending';
    let activeStep = null;

    async function loadData() {
      [pendingList, historyList] = await Promise.all([
        getPendingForApprover(user.role),
        getHistoryForApprover(user.role),
      ]);
    }

    window.switchTab = (tab) => {
      currentTab = tab;
      document.getElementById('tab-pending').className = tab==='pending' ? 'btn btn-primary btn-sm' : 'btn btn-ghost btn-sm';
      document.getElementById('tab-history').className = tab==='history' ? 'btn btn-primary btn-sm' : 'btn btn-ghost btn-sm';
      renderTab();
    };

    function renderTab() {
      const el = document.getElementById('tab-content');
      if (currentTab === 'pending') {
        if (!pendingList.length) {
          el.innerHTML = `<div class="card"><div class="empty-state">
            <div class="empty-icon">🎉</div>
            <div class="empty-title">All caught up!</div>
            <div class="empty-sub">No pending requests need your approval.</div>
          </div></div>`;
          return;
        }
        el.innerHTML = `<div style="display:flex;flex-direction:column;gap:1rem;">
          ${pendingList.map(s => renderStepCard(s)).join('')}
        </div>`;
      } else {
        if (!historyList.length) {
          el.innerHTML = `<div class="card"><div class="empty-state">
            <div class="empty-icon">📋</div>
            <div class="empty-title">No history yet</div>
            <div class="empty-sub">Approved/rejected bookings will appear here.</div>
          </div></div>`;
          return;
        }
        el.innerHTML = `<div class="card" style="overflow:hidden;"><div class="table-wrap"><table>
          <thead><tr><th>Booking</th><th>Requester</th><th>Facility</th><th>Date</th><th>My Action</th><th>Note</th></tr></thead>
          <tbody>
            ${historyList.map(s => {
              const b = s.bookings; const p = b.profiles;
              return `<tr>
                <td style="font-family:'Syne',sans-serif;font-size:.78rem;">${b.id.slice(0,8).toUpperCase()}</td>
                <td>${p?.name}<br><span style="font-size:.74rem;color:var(--text3);">${p?.school_id}</span></td>
                <td style="font-size:.85rem;">${b.facility}</td>
                <td style="font-size:.82rem;">${formatDate(b.date)}</td>
                <td>${statusBadge(s.status)}</td>
                <td style="font-size:.8rem;color:var(--text2);">${s.note||'—'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table></div></div>`;
      }
    }

    function renderStepCard(step) {
      const b = step.bookings;
      const p = b?.profiles;
      const allSteps = (b?.approval_steps||[]).sort((a,z)=>a.step_order-z.step_order);
      return `
        <div class="card p-4">
          <div class="flex-between" style="margin-bottom:1rem;flex-wrap:wrap;gap:.5rem;">
            <div>
              <div style="font-family:'Syne',sans-serif;font-weight:700;">${b.id.slice(0,8).toUpperCase()}</div>
              <div style="font-size:.8rem;color:var(--text2);">Submitted ${formatDateTime(b.created_at)}</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
              ${b.use_led?'<span style="background:rgba(245,158,11,.12);color:var(--accent3);border:1px solid rgba(245,158,11,.25);padding:3px 10px;border-radius:20px;font-size:.75rem;">LED Wall</span>':''}
              ${statusBadge(b.status)}
            </div>
          </div>

          <div class="grid-2 gap-2" style="margin-bottom:1rem;">
            <div><div class="section-title">Requester</div>
              <div style="font-weight:600;">${p?.name}
                <span style="font-size:.72rem;color:var(--text3);"> · ${p?.school_id}</span>
              </div>
              <span class="role-badge ${p?.role}" style="font-size:.65rem;">${p?.role}</span>
            </div>
            <div><div class="section-title">Facility</div><div style="font-weight:600;">${b.facility}</div></div>
            <div><div class="section-title">Date</div><div style="font-weight:600;">${formatDate(b.date)}</div></div>
            <div><div class="section-title">Time</div><div style="font-weight:600;">${formatTime(b.time_start)} – ${formatTime(b.time_end)}</div></div>
            <div style="grid-column:span 2;">
              <div class="section-title">Purpose</div><div style="font-weight:600;">${b.purpose}</div>
            </div>
          </div>

          <!-- Step progress bar -->
          <div style="display:flex;gap:4px;margin-bottom:.6rem;">
            ${allSteps.map(s=>{
              const color = s.status==='approved'?'var(--success)':s.status==='rejected'?'var(--danger)':s.status==='skipped'?'var(--text3)':s.id===step.id?'var(--accent)':'var(--surface2)';
              return `<div style="flex:1;height:4px;border-radius:2px;background:${color};" title="${s.label}: ${s.status}"></div>`;
            }).join('')}
          </div>
          <div style="font-size:.78rem;color:var(--text3);margin-bottom:1rem;">Step ${step.step_order+1} of ${allSteps.length}: ${step.label}</div>

          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <button class="btn btn-success" onclick="openReview('${step.id}','${b.id}')">✓ Approve</button>
            <button class="btn btn-danger"  onclick="openReview('${step.id}','${b.id}',true)">✕ Reject</button>
          </div>
        </div>
      `;
    }

    window.openReview = (stepId, bookingId, isReject=false) => {
      activeStep = pendingList.find(s => s.id === stepId);
      const b = activeStep?.bookings;
      const p = b?.profiles;
      const allSteps = (b?.approval_steps||[]).sort((a,z)=>a.step_order-z.step_order);

      document.getElementById('review-content').innerHTML = `
        <h2 style="font-size:1.1rem;margin-bottom:1.2rem;">
          ${isReject?'Reject':'Approve'} Booking Request
        </h2>
        <div class="grid-2 gap-2" style="margin-bottom:1.2rem;">
          <div><div class="section-title">Requester</div><div style="font-weight:600;">${p?.name} (${p?.school_id})</div></div>
          <div><div class="section-title">Facility</div><div style="font-weight:600;">${b?.facility}</div></div>
          <div><div class="section-title">Date</div><div style="font-weight:600;">${formatDate(b?.date)}</div></div>
          <div><div class="section-title">Time</div><div style="font-weight:600;">${formatTime(b?.time_start)} – ${formatTime(b?.time_end)}</div></div>
          <div style="grid-column:span 2;"><div class="section-title">Purpose</div><div style="font-weight:600;">${b?.purpose}</div></div>
          <div><div class="section-title">Participants</div><div style="font-weight:600;">${b?.participants}</div></div>
          <div><div class="section-title">LED Wall</div><div style="font-weight:600;">${b?.use_led?'✓ Yes':'No'}</div></div>
          ${b?.notes?`<div style="grid-column:span 2;"><div class="section-title">Notes</div><div style="color:var(--text2);font-size:.88rem;">${b.notes}</div></div>`:''}
        </div>

        <div class="divider"></div>
        <div class="section-title">Approval Trail</div>
        <div class="approval-steps" style="margin-bottom:1.2rem;">
          ${allSteps.map((s,i) => `
            <div class="step-item">
              <div class="step-circle ${s.id===stepId?'active':stepClass(s.status)}">${s.id===stepId?'→':stepIcon(s.status)}</div>
              <div class="step-content">
                <div class="step-title">${i+1}. ${s.label}</div>
                <div class="step-sub">${s.status}${s.acted_at?' · '+formatDateTime(s.acted_at):''}</div>
                ${s.note?`<div style="font-size:.78rem;color:var(--text2);">"${s.note}"</div>`:''}
              </div>
            </div>
          `).join('')}
        </div>

        <div class="form-group">
          <label class="form-label">Remarks <span style="color:var(--text3);font-weight:400;">(optional)</span></label>
          <textarea id="action-note" class="form-textarea" style="min-height:72px;" placeholder="Add any conditions or reason…"></textarea>
        </div>

        <div style="display:flex;gap:10px;margin-top:.5rem;">
          <button class="btn btn-success" style="flex:1;justify-content:center;" id="approve-btn" onclick="doAction('approved')">✓ Approve</button>
          <button class="btn btn-danger"  style="flex:1;justify-content:center;" id="reject-btn"  onclick="doAction('rejected')">✕ Reject</button>
        </div>
      `;
      document.getElementById('review-modal').classList.add('open');
    };

    window.doAction = async (action) => {
      if (!activeStep) return;
      const note = document.getElementById('action-note')?.value.trim();
      const b = activeStep.bookings;

      document.getElementById('approve-btn').disabled = true;
      document.getElementById('reject-btn').disabled  = true;

      try {
        const newStatus = await actOnStep(activeStep.id, b.id, action, note, b);
        // Notify requester
        await addNotification(b.user_id,
          `Your booking for ${b.facility} on ${formatDate(b.date)} has been ${action} by ${user.name} (${user.role}).`
        );
        showToast(`Booking ${action}!`, action==='approved'?'success':'error');
        closeModal();
        await loadData();
        renderTab();
      } catch(e) {
        showToast('Error: ' + e.message, 'error');
        document.getElementById('approve-btn').disabled = false;
        document.getElementById('reject-btn').disabled  = false;
      }
    };

    window.closeModal = () => {
      document.getElementById('review-modal').classList.remove('open');
      activeStep = null;
    };

    document.getElementById('review-modal').addEventListener('click', e => {
      if (e.target === document.getElementById('review-modal')) closeModal();
    });

    await loadData();
    renderTab();
  </script>
</body>
</html>

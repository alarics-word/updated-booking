<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SchoolBook — Admin</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div id="nav-ph"></div>
  <div class="page-wrap">
    <div class="page-header">
      <h1>⚙️ Admin Panel</h1>
      <p>Manage user accounts, pending role approvals, and system overview.</p>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap;">
      <button class="btn btn-primary btn-sm" id="tab-users"    onclick="switchTab('users')">User Accounts</button>
      <button class="btn btn-ghost btn-sm"   id="tab-pending"  onclick="switchTab('pending')">Pending Registrations</button>
      <button class="btn btn-ghost btn-sm"   id="tab-bookings" onclick="switchTab('bookings')">All Bookings</button>
    </div>

    <div id="tab-content">
      <div style="text-align:center;padding:3rem;color:var(--text3);">Loading…</div>
    </div>
  </div>

  <!-- USER DETAIL / EDIT MODAL -->
  <div class="modal-overlay" id="user-modal">
    <div class="modal">
      <button class="modal-close" onclick="document.getElementById('user-modal').classList.remove('open')">✕</button>
      <div id="user-modal-content"></div>
    </div>
  </div>

  <!-- BOOKING DETAIL MODAL -->
  <div class="modal-overlay" id="bk-modal">
    <div class="modal" style="max-width:620px;">
      <button class="modal-close" onclick="document.getElementById('bk-modal').classList.remove('open')">✕</button>
      <div id="bk-modal-content"></div>
    </div>
  </div>

  <script type="module">
    import {
      requireAuth, renderNav, initNotifs,
      getAllProfiles, updateProfileStatus, updateProfileRole,
      getAllBookings, addNotification, showToast,
      formatDate, formatDateTime, formatTime, statusBadge, stepClass, stepIcon
    } from './app.js';

    const user = await requireAuth(['president']);
    if (!user) throw new Error();
    document.getElementById('nav-ph').innerHTML = renderNav(user);
    await initNotifs(user);

    let profiles = [], bookings = [], currentTab = 'users';

    async function loadAll() {
      [profiles, bookings] = await Promise.all([getAllProfiles(), getAllBookings()]);
    }

    window.switchTab = (tab) => {
      currentTab = tab;
      ['users','pending','bookings'].forEach(t => {
        document.getElementById(`tab-${t}`).className = t===tab ? 'btn btn-primary btn-sm' : 'btn btn-ghost btn-sm';
      });
      renderTab();
    };

    function renderTab() {
      const el = document.getElementById('tab-content');

      if (currentTab === 'users') {
        const active = profiles.filter(p=>p.status==='active');
        el.innerHTML = `
          <div style="margin-bottom:.8rem;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:.85rem;color:var(--text2);">${active.length} active user(s)</span>
            <div class="search-bar" style="width:220px;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" id="user-search" placeholder="Search…" oninput="filterUsers()"/>
            </div>
          </div>
          <div class="card" style="overflow:hidden;">
            <div class="table-wrap">
              <table id="user-table">
                <thead><tr><th>Name</th><th>School ID</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th>Actions</th></tr></thead>
                <tbody id="user-tbody"></tbody>
              </table>
            </div>
          </div>
        `;
        renderUserRows(active);

      } else if (currentTab === 'pending') {
        const pending = profiles.filter(p=>p.status==='pending');
        if (!pending.length) {
          el.innerHTML = `<div class="card"><div class="empty-state">
            <div class="empty-icon">🎉</div>
            <div class="empty-title">No pending registrations</div>
            <div class="empty-sub">All accounts have been reviewed.</div>
          </div></div>`;
          return;
        }
        el.innerHTML = `
          <div style="margin-bottom:.8rem;font-size:.85rem;color:var(--text2);">${pending.length} account(s) waiting for approval</div>
          <div style="display:flex;flex-direction:column;gap:1rem;">
            ${pending.map(p=>`
              <div class="card p-4">
                <div class="flex-between" style="flex-wrap:wrap;gap:.5rem;margin-bottom:1rem;">
                  <div>
                    <div style="font-weight:700;font-size:1rem;">${p.name}</div>
                    <div style="font-size:.82rem;color:var(--text2);">${p.email} · ID: ${p.school_id}</div>
                    <div style="font-size:.78rem;color:var(--text3);">Registered ${formatDateTime(p.created_at)}</div>
                  </div>
                  <span class="role-badge ${p.role}">${p.role}</span>
                </div>
                <div style="display:flex;gap:10px;">
                  <button class="btn btn-success" onclick="approveUser('${p.id}','${p.name}','${p.role}')">✓ Approve Account</button>
                  <button class="btn btn-danger"  onclick="rejectUser('${p.id}','${p.name}')">✕ Reject</button>
                </div>
              </div>
            `).join('')}
          </div>
        `;

      } else { // bookings
        el.innerHTML = `
          <div style="display:flex;gap:1rem;margin-bottom:1rem;flex-wrap:wrap;">
            <div class="search-bar" style="flex:1;min-width:180px;">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" id="bk-search" placeholder="Search bookings…" oninput="filterBookings()"/>
            </div>
            <select id="bk-status" class="form-select" style="width:auto;" onchange="filterBookings()">
              <option value="">All Status</option>
              <option value="pending">Pending</option>
              <option value="inreview">In Review</option>
              <option value="approved">Approved</option>
              <option value="rejected">Rejected</option>
            </select>
          </div>

          <!-- stats bar -->
          <div class="grid-4 mb-3">
            ${[
              ['📋',bookings.length,'Total'],
              ['✅',bookings.filter(b=>b.status==='approved').length,'Approved'],
              ['⏳',bookings.filter(b=>['pending','inreview'].includes(b.status)).length,'In Progress'],
              ['❌',bookings.filter(b=>b.status==='rejected').length,'Rejected'],
            ].map(([ic,n,lb])=>`
              <div class="card stat-card" style="padding:1rem;">
                <div style="font-size:1.3rem;">${ic}</div>
                <div><div class="stat-val" style="font-size:1.6rem;">${n}</div><div class="stat-lbl">${lb}</div></div>
              </div>
            `).join('')}
          </div>

          <div class="card" style="overflow:hidden;">
            <div class="table-wrap">
              <table>
                <thead><tr><th>Requester</th><th>Facility</th><th>Purpose</th><th>Date</th><th>Status</th><th></th></tr></thead>
                <tbody id="bk-tbody"></tbody>
              </table>
            </div>
          </div>
        `;
        filterBookings();
      }
    }

    function renderUserRows(list) {
      const tbody = document.getElementById('user-tbody');
      if (!tbody) return;
      if (!list.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--text3);padding:2rem;">No users found.</td></tr>'; return; }
      tbody.innerHTML = list.map(p=>`
        <tr>
          <td>${p.name}</td>
          <td style="font-size:.82rem;">${p.school_id}</td>
          <td style="font-size:.82rem;color:var(--text2);">${p.email}</td>
          <td><span class="role-badge ${p.role}">${p.role}</span></td>
          <td><span class="status ${p.status==='active'?'status-approved':'status-rejected'}">${p.status}</span></td>
          <td style="font-size:.78rem;color:var(--text3);">${formatDate(p.created_at)}</td>
          <td>
            ${p.id !== user.id ? `<button class="btn btn-sm btn-ghost" onclick="openUserEdit('${p.id}')">Edit</button>` : '<span style="font-size:.75rem;color:var(--text3);">You</span>'}
          </td>
        </tr>
      `).join('');
    }

    window.filterUsers = () => {
      const q = document.getElementById('user-search')?.value.toLowerCase();
      const active = profiles.filter(p=>p.status==='active');
      renderUserRows(q ? active.filter(p=>`${p.name} ${p.email} ${p.school_id}`.toLowerCase().includes(q)) : active);
    };

    window.filterBookings = () => {
      const q  = document.getElementById('bk-search')?.value.toLowerCase();
      const st = document.getElementById('bk-status')?.value;
      const data = bookings.filter(b=>{
        if (st && b.status!==st) return false;
        if (q && !`${b.profiles?.name} ${b.facility} ${b.purpose}`.toLowerCase().includes(q)) return false;
        return true;
      });
      const tbody = document.getElementById('bk-tbody');
      if (!tbody) return;
      tbody.innerHTML = data.map(b=>`
        <tr>
          <td>
            <div style="font-weight:600;font-size:.88rem;">${b.profiles?.name||'—'}</div>
            <div style="font-size:.74rem;color:var(--text3);">${b.profiles?.school_id||''} · ${b.profiles?.role||''}</div>
          </td>
          <td style="font-size:.85rem;">${b.facility}</td>
          <td style="font-size:.85rem;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${b.purpose}</td>
          <td style="font-size:.82rem;">${formatDate(b.date)}</td>
          <td>${statusBadge(b.status)}</td>
          <td><button class="btn btn-sm btn-ghost" onclick="openBooking('${b.id}')">View</button></td>
        </tr>
      `).join('');
    };

    window.approveUser = async (id, name, role) => {
      try {
        await updateProfileStatus(id, 'active');
        await addNotification(id, `Your ${role} account has been approved! You can now log in to SchoolBook.`);
        showToast(`${name}'s account approved!`, 'success');
        await loadAll(); renderTab();
      } catch(e) { showToast('Error: '+e.message,'error'); }
    };

    window.rejectUser = async (id, name) => {
      if (!confirm(`Reject ${name}'s account?`)) return;
      try {
        await updateProfileStatus(id, 'rejected');
        showToast(`${name}'s account rejected.`, 'error');
        await loadAll(); renderTab();
      } catch(e) { showToast('Error: '+e.message,'error'); }
    };

    window.openUserEdit = (id) => {
      const p = profiles.find(x=>x.id===id);
      if (!p) return;
      document.getElementById('user-modal-content').innerHTML = `
        <h2 style="font-size:1.1rem;margin-bottom:1.2rem;">Edit User Account</h2>
        <div style="margin-bottom:1.2rem;">
          <div style="font-weight:700;">${p.name}</div>
          <div style="font-size:.82rem;color:var(--text2);">${p.email} · ${p.school_id}</div>
        </div>

        <div class="form-group">
          <label class="form-label">Role</label>
          <select id="edit-role" class="form-select">
            ${['student','faculty','custodian','finance','president'].map(r=>`<option value="${r}" ${p.role===r?'selected':''}>${r}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select id="edit-status" class="form-select">
            <option value="active"   ${p.status==='active'?'selected':''}>Active</option>
            <option value="pending"  ${p.status==='pending'?'selected':''}>Pending</option>
            <option value="rejected" ${p.status==='rejected'?'selected':''}>Rejected</option>
          </select>
        </div>
        <div style="font-size:.78rem;color:var(--text3);margin-bottom:1.2rem;">
          ⚠️ Changing role will take effect on next login.
        </div>
        <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="saveUserEdit('${p.id}')">Save Changes</button>
      `;
      document.getElementById('user-modal').classList.add('open');
    };

    window.saveUserEdit = async (id) => {
      const role   = document.getElementById('edit-role').value;
      const status = document.getElementById('edit-status').value;
      try {
        await updateProfileRole(id, role);
        await updateProfileStatus(id, status);
        showToast('User updated!','success');
        document.getElementById('user-modal').classList.remove('open');
        await loadAll(); renderTab();
      } catch(e) { showToast('Error: '+e.message,'error'); }
    };

    window.openBooking = (id) => {
      const b = bookings.find(x=>x.id===id);
      if (!b) return;
      const steps = (b.approval_steps||[]).sort((a,z)=>a.step_order-z.step_order);
      document.getElementById('bk-modal-content').innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;flex-wrap:wrap;gap:.5rem;">
          <h2 style="font-size:1.1rem;">${b.facility}</h2>
          ${statusBadge(b.status)}
        </div>
        <div style="font-size:.8rem;color:var(--text3);margin-bottom:1.2rem;">
          By ${b.profiles?.name||'—'} (${b.profiles?.role||'—'} · ${b.profiles?.school_id||'—'}) · ${formatDateTime(b.created_at)}
        </div>
        <div class="grid-2 gap-2" style="margin-bottom:1.5rem;">
          <div><div class="section-title">Date</div><div style="font-weight:600;">${formatDate(b.date)}</div></div>
          <div><div class="section-title">Time</div><div style="font-weight:600;">${formatTime(b.time_start)} – ${formatTime(b.time_end)}</div></div>
          <div style="grid-column:span 2;"><div class="section-title">Purpose</div><div style="font-weight:600;">${b.purpose}</div></div>
          <div><div class="section-title">Participants</div><div style="font-weight:600;">${b.participants}</div></div>
          <div><div class="section-title">LED Wall</div><div style="font-weight:600;">${b.use_led?'✓ Yes':'No'}</div></div>
          ${b.notes?`<div style="grid-column:span 2;"><div class="section-title">Notes</div><div style="font-size:.88rem;color:var(--text2);">${b.notes}</div></div>`:''}
        </div>
        <div class="divider"></div>
        <div class="section-title">Approval Trail</div>
        <div class="approval-steps">
          ${steps.map((s,i)=>`
            <div class="step-item">
              <div class="step-circle ${stepClass(s.status)}">${stepIcon(s.status)}</div>
              <div class="step-content">
                <div class="step-title">${i+1}. ${s.label}</div>
                <div class="step-sub">${s.status}${s.acted_at?' · '+formatDateTime(s.acted_at):''}</div>
                ${s.note?`<div style="font-size:.78rem;color:var(--text2);">"${s.note}"</div>`:''}
              </div>
            </div>
          `).join('')}
        </div>
      `;
      document.getElementById('bk-modal').classList.add('open');
    };

    ['user-modal','bk-modal'].forEach(id=>{
      document.getElementById(id).addEventListener('click', e=>{
        if (e.target===document.getElementById(id)) document.getElementById(id).classList.remove('open');
      });
    });

    await loadAll();
    renderTab();
  </script>
</body>
</html>
